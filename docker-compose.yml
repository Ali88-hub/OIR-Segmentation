services:
  oirseg:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      # Model checkpoint (read-only) — place best_model.pth in ./checkpoints/
      - ./checkpoints:/app/checkpoints:ro
      # ChromaDB vector store (writable — populated by ingest.py)
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
